{% extends "base.html" %}
{% load static %}


{% block title %} Iniciar sesion {% endblock title %}

{% block content %}
<section class="login-page">
    <section class="form-main">
        <div class="form-content">
            <div class="box">
                <h3>Bienvenido</h3>
                <form action="">
                    <div class="input-box">
                        <input type="text" placeholder="Email" class="input-control">
                    </div>
                    <div class="input-box">
                        <input type="password" placeholder="Password" class="input-control">
                    <div class="input-link">
                        <a href="{% url 'recuperar' %}" class="gradient-text">Has olvidado tu contraseña</a>
                    </div> 
                   </div>
                   <button type="submit" class="btn"> Iniciar Sesión</button>
                </form>
                <p>¿No tienes una cuenta? <a href="{% url 'singup' %}" class="gradient-text">Crear cuenta</a> </p>
            </div>
        </div>
    </section>    
</section>

{% endblock content %}
