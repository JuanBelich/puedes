{% extends 'base.html' %}  <!-- Si tienes una plantilla base -->
{% load static %}

{% block content %}
<form method="post" class="usuario-form">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="id_nombre">Nombre*</label>
        <input type="text" class="form-control" id="id_nombre" name="nombre" required maxlength="50">
    </div>
    
    <div class="form-group">
        <label for="id_apellido">Apellido*</label>
        <input type="text" class="form-control" id="id_apellido" name="apellido" required maxlength="50">
    </div>
    
    <div class="form-group">
        <label for="id_fecha_nacimiento">Fecha de Nacimiento*</label>
        <input type="date" class="form-control" id="id_fecha_nacimiento" name="fecha_nacimiento" required>
    </div>
    
    <div class="form-group">
        <label for="id_direccion">Dirección*</label>
        <input type="text" class="form-control" id="id_direccion" name="direccion" required maxlength="50">
    </div>
    
    <div class="form-group">
        <label for="id_telefono">Teléfono*</label>
        <input type="text" class="form-control" id="id_telefono" name="telefono" required maxlength="50">
    </div>
    
    <button type="submit" class="btn btn-primary">Guardar Usuario</button>
</form>

{% endblock %}
